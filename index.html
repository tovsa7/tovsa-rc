<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tovsa RC</title>
<link rel="manifest" href="/manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--sf:#12121a;--bd:rgba(255,255,255,.08);
  --tx:#e8e8f0;--mu:#6060a0;--a:#00ff9d;--e:#ff4d6d;--w:#e5c07b;
  --ad:rgba(0,255,157,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace}
#app{position:fixed;inset:0;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
#topbar-title{font-size:13px;font-weight:700;letter-spacing:1.5px;flex:1}
#screens{flex:1;position:relative;overflow:hidden}
.scr{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.scr.on{display:flex}
#tabbar{display:flex;background:var(--sf);border-top:1px solid var(--bd);padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;position:relative}
#tab-pill{position:absolute;top:0;height:2px;background:var(--a);border-radius:0 0 2px 2px;transition:left .2s,width .2s}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:transparent;color:var(--mu);font-family:inherit;font-size:9px;font-weight:700;letter-spacing:.8px;cursor:pointer;transition:color .15s}
.tab .ti{font-size:18px;line-height:1}
.tab.act{color:var(--a)}
.badge{position:absolute;top:6px;right:6px;background:var(--e);color:#fff;border-radius:99px;font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}
#s-device{position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column;display:none}
#s-device.on{display:flex}
.dev-header{display:flex;align-items:center;gap:10px;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.dev-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.dev-sub{font-size:10px;color:var(--mu);margin-top:2px}
.btn{background:var(--a);color:#000;border:none;border-radius:10px;padding:12px 18px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s,transform .1s}
.btn:active{opacity:.8;transform:scale(.97)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn.sm{padding:7px 12px;font-size:11px;border-radius:8px}
.btn.ghost{background:transparent;color:var(--mu);border:1px solid var(--bd)}
.btn.ghost:active{background:var(--sf)}
.btn.danger{background:var(--e);color:#fff}
.btn.full{width:100%}
input,select{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:inherit;font-size:12px;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--a)}
input::placeholder{color:var(--mu)}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px}
.card-title{font-size:10px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase}
.row{display:flex;gap:8px;align-items:center}
.scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--mu);transition:background .3s}
.dot.on{background:var(--a);box-shadow:0 0 8px var(--a)}
.dot.err{background:var(--e)}
#toasts{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:8px 16px;font-size:12px;pointer-events:all;animation:fadeIn .2s}
.toast.ok{border-color:rgba(0,255,157,.3);color:var(--a)}
.toast.err{border-color:rgba(255,77,109,.3);color:var(--e)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.my-id{font-size:10px;color:var(--mu);background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qr-wrap{display:flex;justify-content:center;padding:8px;background:#fff;border-radius:10px}
.device-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s}
.device-item:active{background:var(--sf)}
.device-avatar{font-size:28px;flex-shrink:0}
.device-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.device-status{font-size:10px;color:var(--mu);display:flex;align-items:center;gap:5px;margin-top:3px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--mu)}
.sdot.on{background:var(--a)}
.sdot.rtc{background:#60a5fa}
.rtc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid var(--bd);color:var(--mu);flex-shrink:0}
.rtc-badge.open{border-color:rgba(96,165,250,.4);color:#60a5fa}
.rtc-badge.connecting{border-color:rgba(229,192,123,.4);color:var(--w)}
/* Screen */
#scr-panel{display:flex;flex-direction:column;flex:1;min-height:0}
#scr-toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
#scr-keys{display:flex;gap:4px;padding:4px 10px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
#scr-wrap{flex:1;min-height:0;background:#000;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
#scr-img{max-width:100%;max-height:100%;object-fit:contain;display:none;touch-action:none;cursor:crosshair}
#scr-hint{color:var(--mu);font-size:12px;text-align:center;padding:32px}
#scr-tap{position:absolute;border-radius:50%;background:rgba(0,255,157,.4);width:28px;height:28px;pointer-events:none;display:none;transform:translate(-50%,-50%);transition:opacity .3s}
#scr-text-row{display:flex;gap:6px;padding:6px 10px;background:var(--sf);border-top:1px solid var(--bd);flex-shrink:0}
/* Agent */
#agent-ls{background:var(--bg);border:1px solid var(--bd);border-radius:8px;overflow:hidden;max-height:200px;overflow-y:auto}
.ls-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid rgba(44,44,66,.4);cursor:pointer;font-size:12px}
.ls-item:active{background:var(--sf)}
#agent-out{display:none;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;font-size:10px;line-height:1.7;max-height:150px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
/* Log */
#r-log{flex:1;overflow-y:auto;padding:8px 10px;font-size:11px;line-height:1.8;font-family:'JetBrains Mono',monospace}
.l-ok{color:var(--a)}.l-err{color:var(--e)}.l-in{color:#60a5fa}
/* Modal */
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);display:none;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(4px)}
.modal.on{display:flex}
.modal-sheet{background:var(--sf);border-radius:20px 20px 0 0;border-top:1px solid var(--bd);padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:12px}
.modal-title{font-size:14px;font-weight:700}
@keyframes slideInR{from{transform:translateX(100%)}to{transform:none}}
@keyframes slideOutR{from{transform:none}to{transform:translateX(100%)}}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="btn-back" onclick="closeDevice()" style="display:none;background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;padding:0;line-height:1">‹</button>
    <div id="topbar-title">TOVSA RC</div>
    <div class="dot" id="conn-dot"></div>
    <span id="my-id-badge" style="display:none;font-size:9px;color:var(--mu);max-width:100px;overflow:hidden;text-overflow:ellipsis;cursor:pointer" onclick="copyMyId()"></span>
  </div>

  <div id="screens">
    <!-- Settings -->
    <div class="scr on" id="s-settings">
      <div class="scroll">
        <div class="card">
          <div class="card-title">Подключение</div>
          <select id="srv-select" onchange="onSrvChange()">
            <option value="wss://tovsa-signaling.onrender.com/signal">Tovsa (Render)</option>
            <option value="custom">Свой сервер...</option>
          </select>
          <input id="srv-custom" placeholder="wss://..." style="display:none">
          <button class="btn full" id="btn-connect" onclick="connectToServer()">Подключиться</button>
        </div>
      </div>
    </div>

    <!-- Agent -->
    <div class="scr" id="s-agent">
      <div class="scroll">
        <div class="card">
          <div class="card-title" style="display:flex;justify-content:space-between">
            <span>Агент</span>
            <span id="agent-status" style="color:var(--mu)">не подключён</span>
          </div>
          <div id="agent-install" style="font-size:11px;color:var(--mu);line-height:1.9">
            Termux:<br>
            <code style="color:var(--a);cursor:pointer;user-select:all" onclick="copyText(this.textContent)">pkg install python curl python-cryptography && python3 -c "$(curl -fsSL https://tovsa7.github.io/tovsa-rc/bootstrap.py)"</code>
          </div>
          <div class="row">
            <input id="agent-url" value="https://localhost:7071" style="flex:1;font-size:11px">
            <button class="btn sm" id="btn-agent" onclick="agentConnect()">Подключить</button>
          </div>
          <div id="agent-info" style="display:none;font-size:11px;color:var(--mu);line-height:1.8"></div>
          <div id="agent-term" style="display:none;flex-direction:column;gap:8px">
            <div id="agent-cwd" style="font-size:10px;color:var(--a);background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;cursor:pointer" onclick="agentCd('..')">📁 /</div>
            <div id="agent-ls"></div>
            <div class="row">
              <input id="agent-cmd" placeholder="команда..." style="flex:1;font-size:11px" onkeydown="if(event.key==='Enter')agentRun()">
              <button class="btn sm" onclick="agentRun()">▶</button>
            </div>
            <div id="agent-out"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Devices -->
    <div class="scr" id="s-devices">
      <div id="device-list" style="flex:1;overflow-y:auto"></div>
      <div style="padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,12px));border-top:1px solid var(--bd);background:var(--sf)">
        <button class="btn full" id="btn-add" onclick="showAddModal()" disabled>+ Добавить устройство</button>
      </div>
    </div>

    <!-- Log -->
    <div class="scr" id="s-log">
      <div style="display:flex;align-items:center;padding:8px 12px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0">
        <span style="flex:1;font-size:10px;font-weight:700;color:var(--mu);letter-spacing:1px">ЛОГ</span>
        <button onclick="copyLog()" style="background:none;border:none;font-size:11px;color:var(--mu);cursor:pointer;padding:4px 8px;font-family:inherit">📋</button>
        <button onclick="$('r-log').innerHTML=''" style="background:none;border:none;font-size:11px;color:var(--mu);cursor:pointer;padding:4px 8px;font-family:inherit">🗑</button>
      </div>
      <div id="r-log"></div>
    </div>
  </div>

  <div id="tabbar">
    <div id="tab-pill"></div>
    <button class="tab act" id="tab-settings" onclick="goTab('settings')"><div class="ti">⚙️</div>НАСТРОЙКИ</button>
    <button class="tab" id="tab-agent"   onclick="goTab('agent')"><div class="ti">⚡</div>АГЕНТ</button>
    <button class="tab" id="tab-devices" onclick="goTab('devices')">
      <div style="position:relative;display:inline-block"><div class="ti">📱</div><span class="badge" id="devices-badge" style="display:none"></span></div>
      УСТРОЙСТВА
    </button>
    <button class="tab" id="tab-log" onclick="goTab('log')"><div class="ti">📋</div>ЛОГ</button>
  </div>
</div>

<!-- Device screen overlay -->
<div id="s-device">
  <div class="dev-header">
    <button onclick="closeDevice()" style="background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;padding:0;line-height:1;flex-shrink:0">‹</button>
    <div style="flex:1;min-width:0">
      <div class="dev-name" id="dev-name">—</div>
    </div>
    <span class="rtc-badge" id="dev-rtc-badge">нет RTC</span>
    <button class="btn sm" id="dev-rtc-btn" onclick="devStartRtc()">🔗 RTC</button>
  </div>
  <div id="scr-panel">
    <div id="scr-toolbar">
      <span id="scr-fps" style="font-size:10px;color:var(--mu);min-width:42px">— fps</span>
      <span id="scr-res" style="font-size:10px;color:var(--mu);flex:1"></span>
      <button class="btn sm ghost" onclick="scrSetQ(40)">Lo</button>
      <button class="btn sm ghost" onclick="scrSetQ(65)">Mid</button>
      <button class="btn sm ghost" onclick="scrSetQ(90)">Hi</button>
      <button class="btn sm" id="scr-btn" onclick="scrToggle()">▶ Старт</button>
    </div>
    <div id="scr-keys">
      <button class="btn sm ghost" style="flex:1" onclick="scrKey(3)">⌂</button>
      <button class="btn sm ghost" style="flex:1" onclick="scrKey(4)">←</button>
      <button class="btn sm ghost" style="flex:1" onclick="scrKey(187)">⧉</button>
      <button class="btn sm ghost" style="flex:1" onclick="scrKey(24)">🔊</button>
      <button class="btn sm ghost" style="flex:1" onclick="scrKey(25)">🔉</button>
      <button class="btn sm ghost" style="flex:1" onclick="scrKey(26)">⏻</button>
    </div>
    <div id="scr-wrap">
      <img id="scr-img" draggable="false"
           onpointerdown="scrPtrDown(event)"
           onpointerup="scrPtrUp(event)">
      <div id="scr-hint">Нажми ▶ Старт</div>
      <div id="scr-tap"></div>
    </div>
    <div id="scr-text-row">
      <input id="scr-text" placeholder="Текст для ввода..." style="flex:1;font-size:12px"

</div>

<!-- Add device modal -->
<div class="modal" id="add-modal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-sheet">
    <div style="display:flex;align-items:center">
      <div class="modal-title" style="flex:1">Добавить устройство</div>
      <button onclick="closeAddModal()" style="background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;padding:0">×</button>
    </div>
    <div style="font-size:11px;color:var(--mu);text-align:center">Покажи QR второму устройству</div>
    <div class="qr-wrap" id="add-qr"></div>
    <div class="my-id" id="add-my-id" onclick="copyMyId()">—</div>
    <div style="font-size:11px;color:var(--mu);text-align:center">или введи ID вручную:</div>
    <input id="add-name" placeholder="Имя устройства">
    <input id="add-id" placeholder="tvp-...">
    <button class="btn full" onclick="doAddPeer()">+ Добавить</button>
    <div style="border-top:1px solid var(--bd);margin:0 -20px;padding:12px 20px 0">
      <button class="btn danger sm full" onclick="closeAddModal();resetKey()">Сбросить ключ (ID изменится)</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
'use strict';

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let ws = null, myId = '', isOpen = false;
let myPrivKey = null, myPubRaw = null;
const peers = {};
const rtcs  = {};
let currentDevice = null;

// Agent
let _agentUrl = 'https://localhost:7071';
let _agentCwd = '';

// Screen
let _scrRunning = false, _scrQ = 65;
let _scrW = 1080, _scrH = 1920;
let _scrPtrDown = false, _scrX0 = 0, _scrY0 = 0, _scrT0 = 0;
let _scrFpsCount = 0, _scrFpsTs = 0;

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
const $ = id => document.getElementById(id);

function toast(msg, type='', dur=2800){
  const c=$('toasts'), el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .25s';setTimeout(()=>el.remove(),250);},dur);
}

function rlog(msg, cls=''){
  const el=$('r-log'); if(!el) return;
  const d=document.createElement('div');
  d.className=cls?'l-'+cls:'';
  d.textContent='['+tsNow()+'] '+msg;
  el.appendChild(d);
  el.scrollTop=el.scrollHeight;
}

function tsNow(){ return new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtSz(n){ return n<1024?n+'B':n<1048576?(n/1024).toFixed(1)+'KB':(n/1048576).toFixed(1)+'MB'; }
function copyText(t){ navigator.clipboard.writeText(t).then(()=>toast('Скопировано','ok')).catch(()=>{}); }
function copyMyId(){ copyText(myId); }
function copyLog(){
  const lines=Array.from($('r-log').children).map(c=>c.textContent).join('\n');
  copyText(lines);
}

function goTab(name){
  ['settings','agent','devices','log'].forEach(t=>{
    $('tab-'+t).classList.toggle('act',t===name);
    $('s-'+t).classList.toggle('on',t===name);
  });
  movePill('tab-'+name);
}

function movePill(id){
  const pill=$('tab-pill'), bar=$('tabbar'), tab=$(id);
  if(!pill||!bar||!tab) return;
  const br=bar.getBoundingClientRect(), tr=tab.getBoundingClientRect();
  pill.style.left=(tr.left-br.left)+'px';
  pill.style.width=tr.width+'px';
}

// ════════════════════════════════════════════
// IDENTITY
// ════════════════════════════════════════════
async function loadOrGenKey(){
  try{
    const kj=JSON.parse(localStorage.getItem('tvrc_key')||'null');
    const pj=JSON.parse(localStorage.getItem('tvrc_pub')||'null');
    if(kj&&pj){
      myPrivKey=await crypto.subtle.importKey('jwk',kj,{name:'Ed25519'},false,['sign']);
      const pk=await crypto.subtle.importKey('jwk',pj,{name:'Ed25519'},true,[]);
      myPubRaw=new Uint8Array(await crypto.subtle.exportKey('raw',pk));
    }
  }catch(_){}
  if(!myPrivKey){
    const kp=await crypto.subtle.generateKey({name:'Ed25519'},true,['sign','verify']);
    myPrivKey=kp.privateKey;
    myPubRaw=new Uint8Array(await crypto.subtle.exportKey('raw',kp.publicKey));
    localStorage.setItem('tvrc_key',JSON.stringify(await crypto.subtle.exportKey('jwk',kp.privateKey)));
    localStorage.setItem('tvrc_pub',JSON.stringify(await crypto.subtle.exportKey('jwk',kp.publicKey)));
  }
  const h=await crypto.subtle.digest('SHA-256',myPubRaw);
  myId='tvp-'+Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,48);
  $('my-id-badge').textContent=myId;
}

async function signAuth(nonce){
  const msg=new TextEncoder().encode('tovsa-auth:'+nonce+':'+myId);
  const sig=await crypto.subtle.sign('Ed25519',myPrivKey,msg);
  return {pub:Array.from(myPubRaw),sig:Array.from(new Uint8Array(sig))};
}

async function resetKey(){
  if(!confirm('Удалить ключ? ID изменится.')) return;
  ['tvrc_key','tvrc_pub'].forEach(k=>localStorage.removeItem(k));
  myPrivKey=null; myPubRaw=null;
  await loadOrGenKey();
  generateQr();
  if(ws){try{ws.close();}catch(_){} ws=null; isOpen=false; setDot('');}
  toast('Новый ключ создан','ok');
}

// ════════════════════════════════════════════
// E2E — ECDH + AES-GCM
// ════════════════════════════════════════════
async function ecdhGenKP(){
  const kp=await crypto.subtle.generateKey({name:'X25519'},true,['deriveBits']);
  const pub=new Uint8Array(await crypto.subtle.exportKey('raw',kp.publicKey));
  const jwk=await crypto.subtle.exportKey('jwk',kp.privateKey);
  return {pub,jwk};
}

async function ecdhDerive(jwk, theirPub){
  const priv=await crypto.subtle.importKey('jwk',jwk,{name:'X25519'},false,['deriveBits']);
  const pub=await crypto.subtle.importKey('raw',theirPub,{name:'X25519'},false,[]);
  const bits=await crypto.subtle.deriveBits({name:'X25519',public:pub},priv,256);
  return crypto.subtle.importKey('raw',bits,'AES-GCM',false,['encrypt','decrypt']);
}

async function aesEncrypt(key, pt){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(pt));
  const buf=new Uint8Array(12+ct.byteLength); buf.set(iv); buf.set(new Uint8Array(ct),12);
  return btoa(String.fromCharCode(...buf));
}

async function aesDecrypt(key, b64){
  const buf=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(0,12)},key,buf.slice(12));
  return new TextDecoder().decode(pt);
}

const b64e = buf => { let s=''; for(const b of buf) s+=String.fromCharCode(b); return btoa(s); };
const b64d = s => Uint8Array.from(atob(s),c=>c.charCodeAt(0));

// WEBSOCKET
// ════════════════════════════════════════════
function setDot(cls){ const d=$('conn-dot'); d.className='dot'+(cls?' '+cls:''); }
function onSrvChange(){ $('srv-custom').style.display=$('srv-select').value==='custom'?'':'none'; }

function connectToServer(){
  const url=$('srv-select').value==='custom'?$('srv-custom').value.trim():$('srv-select').value;
  if(!url){toast('Введи URL','err');return;}
  localStorage.setItem('tvrc_srv',url);
  $('btn-connect').disabled=true; $('btn-connect').textContent='Подключаюсь...';
  setDot('');
  if(ws){try{ws.close(1000,'reconnect');}catch(_){} ws=null;}
  ws=new WebSocket(url);
  ws.onopen=()=>{setDot('act'); window._wsRA=0;};
  ws.onclose=e=>{
    setDot(''); isOpen=false;
    $('btn-connect').disabled=false; $('btn-connect').textContent='Подключиться';
    $('btn-add').disabled=true;
    rlog('WS закрыт: '+e.code,'err');
    if(e.code===1000||e.code===1001||e.code>=4000) return;
    window._wsRA=(window._wsRA||0)+1;
    const d=Math.min(1000*Math.pow(1.5,window._wsRA-1),30000);
    setTimeout(connectToServer,d);
  };
  ws.onerror=()=>{ setDot('err'); $('btn-connect').disabled=false; $('btn-connect').textContent='Подключиться'; toast('Ошибка','err'); };
  ws.onmessage=e=>{ let m; try{m=JSON.parse(e.data);}catch{return;} handleServer(m); };
}

function wsSend(msg){
  if(!ws||ws.readyState!==WebSocket.OPEN) return false;
  ws.send(JSON.stringify(msg)); return true;
}

function handleServer(m){
  switch(m.type){
    case 'HELLO_REQ': wsSend({type:'HELLO',id:myId,v:5}); break;
    case 'CHALLENGE': signAuth(m.nonce).then(({pub,sig})=>wsSend({type:'AUTH',pub,sig})); break;
    case 'OPEN':
      isOpen=true; setDot('on');
      $('my-id-badge').style.display='inline-block';
      $('btn-connect').disabled=false; $('btn-connect').textContent='Переподключить';
      $('btn-add').disabled=false;
      rlog('Подключено ✓','ok'); toast('Подключено!','ok');
      schedulePresence();
      break;
    case 'ERR':
      rlog('ERR '+m.code+(m.msg?' '+m.msg:''),'err');
      if(m.code===4001) toast('ID занят — другая вкладка?','err',5000);
      else toast('Ошибка: '+m.code,'err');
      $('btn-connect').disabled=false; $('btn-connect').textContent='Подключиться';
      break;
    case 'RELAY':         handleRelay(m.from,m.kind,m.data); break;
    case 'RELAY-ACK':     if(!m.delivered) toast('Устройство недоступно','err'); break;
    case 'PRESENCE-RESULT': handlePresenceResult(m); break;
    case 'PING': wsSend({type:'PONG'}); break;
  }
}

let _presTimer=null;
function schedulePresence(){ if(_presTimer) clearInterval(_presTimer); doPresence(); _presTimer=setInterval(doPresence,15000); }
function doPresence(){ const ids=Object.keys(peers); if(!ids.length||!isOpen) return; wsSend({type:'PRESENCE',reqId:'p'+Date.now(),ids}); }
function handlePresenceResult(m){
  const online=Array.isArray(m.online)?m.online:[];
  let ch=false;
  for(const id of Object.keys(peers)){ const was=peers[id].online; peers[id].online=online.includes(id); if(was!==peers[id].online) ch=true; }
  if(ch) renderDeviceList();
}

// ════════════════════════════════════════════
// WEBRTC
// ════════════════════════════════════════════
const STUN=[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}];

function getRtc(id){
  if(rtcs[id]) return rtcs[id];
  const entry={pc:new RTCPeerConnection({iceServers:STUN}),dc:null,state:'new',pending:[],aesKey:null,_ecdhKP:null};
  rtcs[id]=entry;

  entry.pc.onicecandidate=e=>{
    if(e.candidate&&e.candidate.type!=='host')
      wsSend({type:'RELAY',to:id,kind:'ice',data:e.candidate});
  };

  entry.pc.onconnectionstatechange=()=>{
    const s=entry.pc.connectionState;
    rlog('RTC ['+id.slice(0,14)+'] '+s, s==='connected'?'ok':s==='failed'?'err':'');
    if(s==='connected') entry.state='open';
    else if(['failed','disconnected','closed'].includes(s)) entry.state='closed';
    if(currentDevice===id) updateRtcBadge(id);
    renderDeviceList();
  };

  entry.pc.oniceconnectionstatechange=()=>{
    if(entry.pc.iceConnectionState==='failed'){
      rlog('ICE failed — Symmetric NAT?','err');
      toast('P2P не удался. Попробуй Wi-Fi.','err',6000);
    }
  };

  entry.pc.ondatachannel=e=>{ entry._isInitiator=false; setupDc(id,e.channel); };
  return entry;
}

function setupDc(id,dc){
  const entry=rtcs[id]; if(!entry) return;
  entry.dc=dc;
  dc.onopen=async()=>{
    entry.state='open'; renderDeviceList();
    if(currentDevice===id) updateRtcBadge(id);
    rlog('DataChannel открыт ['+id.slice(0,14)+']','ok');
    toast('RTC подключён!','ok');
    if(entry._isInitiator){
      entry._ecdhKP=await ecdhGenKP();
      dcRaw(id,{_t:'ecdh_hello',pub:b64e(entry._ecdhKP.pub)});
    }
  };
  dc.onclose=()=>{ entry.state='closed'; entry.aesKey=null; if(currentDevice===id) updateRtcBadge(id); renderDeviceList(); };
  dc.onmessage=e=>{ let m; try{m=JSON.parse(e.data);}catch{return;} handleDc(id,m); };
}

async function createOffer(id){
  const entry=getRtc(id);
  entry._isInitiator=true;
  const dc=entry.pc.createDataChannel('tvrc',{ordered:true});
  setupDc(id,dc);
  entry.state='connecting';
  if(currentDevice===id) updateRtcBadge(id);
  try{
    const offer=await entry.pc.createOffer();
    await entry.pc.setLocalDescription(offer);
    wsSend({type:'RELAY',to:id,kind:'offer',data:offer});
  }catch(e){ rlog('createOffer: '+e.message,'err'); toast('Ошибка RTC','err'); }
}

async function handleRelay(from,kind,data){
  if(!peers[from]) return; // ignore unknown peers
  const entry=getRtc(from);
  if(kind==='offer'){
    try{
      await entry.pc.setRemoteDescription(data);
      const ans=await entry.pc.createAnswer();
      await entry.pc.setLocalDescription(ans);
      wsSend({type:'RELAY',to:from,kind:'answer',data:ans});
      for(const c of entry.pending) await entry.pc.addIceCandidate(c).catch(()=>{});
      entry.pending=[];
    }catch(e){ rlog('answer: '+e.message,'err'); }
  } else if(kind==='answer'){
    try{ await entry.pc.setRemoteDescription(data); for(const c of entry.pending) await entry.pc.addIceCandidate(c).catch(()=>{}); entry.pending=[]; }
    catch(e){ rlog('setRemote: '+e.message,'err'); }
  } else if(kind==='ice'){
    if(entry.pc.remoteDescription) await entry.pc.addIceCandidate(data).catch(()=>{});
    else entry.pending.push(data);
  }
}

// ════════════════════════════════════════════
// DATACHANNEL
// ════════════════════════════════════════════
function dcRaw(id,msg){
  const e=rtcs[id||currentDevice];
  if(!e?.dc||e.dc.readyState!=='open') return false;
  e.dc.send(JSON.stringify(msg)); return true;
}

async function dcSend(id,msg){
  const e=rtcs[id||currentDevice];
  if(!e?.dc||e.dc.readyState!=='open'){toast('RTC не подключён','err');return false;}
  if(e.aesKey){ e.dc.send(JSON.stringify({_e:await aesEncrypt(e.aesKey,JSON.stringify(msg))})); }
  else { e.dc.send(JSON.stringify(msg)); }
  return true;
}

async function handleDc(from,msg){
  const entry=rtcs[from];
  if(msg._t==='ecdh_hello'){
    entry._ecdhKP=await ecdhGenKP();
    entry.aesKey=await ecdhDerive(entry._ecdhKP.jwk,b64d(msg.pub));
    dcRaw(from,{_t:'ecdh_ack',pub:b64e(entry._ecdhKP.pub)});
    rlog('E2E ключ установлен ['+from.slice(0,14)+']','ok');
    if(currentDevice===from) updateRtcBadge(from);
    return;
  }
  if(msg._t==='ecdh_ack'){
    entry.aesKey=await ecdhDerive(entry._ecdhKP.jwk,b64d(msg.pub));
    rlog('E2E ключ установлен ['+from.slice(0,14)+']','ok');
    if(currentDevice===from) updateRtcBadge(from);
    return;
  }
  if(msg._e){
    if(!entry.aesKey) return;
    try{ msg=JSON.parse(await aesDecrypt(entry.aesKey,msg._e)); }
    catch(e){ rlog('Decrypt: '+e.message,'err'); return; }
  }
  handleDcMsg(from,msg);
}

function handleDcMsg(from,msg){
  switch(msg.type){
    case 'screen_start':  scrHostStart(from,msg); break;
    case 'screen_stop':   scrHostStop(from); scrCtrlStopped(); break;
    case 'screen_input':  scrHostInput(from,msg); break;
    case 'screen_frame':  scrCtrlFrame(msg); break;
    case 'screen_info':   _scrW=msg.w; _scrH=msg.h; $('scr-res').textContent=msg.w+'×'+msg.h; break;
  }
}

    return;
  }
  list.innerHTML=ids.map(id=>{

// ════════════════════════════════════════════
// SCREEN MIRROR
// ════════════════════════════════════════════
function scrNorm(e){
  const img=$('scr-img'), rect=img.getBoundingClientRect();
  const ia=_scrW/_scrH, ba=rect.width/rect.height;
  let dW,dH,oX,oY;
  if(ia>ba){dW=rect.width;dH=rect.width/ia;oX=0;oY=(rect.height-dH)/2;}
  else{dH=rect.height;dW=rect.height*ia;oY=0;oX=(rect.width-dW)/2;}
  return{x:Math.max(0,Math.min(1,(e.clientX-rect.left-oX)/dW)),y:Math.max(0,Math.min(1,(e.clientY-rect.top-oY)/dH))};
}

function scrFlash(e){
  const fl=$('scr-tap'), img=$('scr-img'), rect=img.getBoundingClientRect();
  fl.style.left=(e.clientX-rect.left)+'px'; fl.style.top=(e.clientY-rect.top)+'px';
  fl.style.display='block'; fl.style.opacity='1';
  setTimeout(()=>{fl.style.opacity='0';setTimeout(()=>fl.style.display='none',300);},150);
}

function scrPtrDown(e){
  if(!_scrRunning) return; e.preventDefault();
  _scrPtrDown=true; _scrT0=Date.now();
  const c=scrNorm(e); _scrX0=c.x; _scrY0=c.y;
  $('scr-img').setPointerCapture(e.pointerId);
}

function scrPtrUp(e){
  if(!_scrRunning||!_scrPtrDown) return; e.preventDefault(); _scrPtrDown=false;
  const c=scrNorm(e), dx=Math.abs(c.x-_scrX0), dy=Math.abs(c.y-_scrY0);
  scrFlash(e);
  const inp=dx<0.02&&dy<0.02?{type:'tap',x:c.x,y:c.y}:{type:'swipe',x1:_scrX0,y1:_scrY0,x2:c.x,y2:c.y,ms:Math.max(100,Math.min(Date.now()-_scrT0,600))};
  if(currentDevice) dcRaw(currentDevice,{type:'screen_input',...inp});
  else agentFetch('/input',inp).catch(()=>{});
}

function scrKey(kc){
  const inp={type:'key',keycode:kc};
  if(currentDevice) dcRaw(currentDevice,{type:'screen_input',...inp});
  else agentFetch('/input',inp).catch(()=>{});
}

function scrSendText(){
  const el=$('scr-text'), t=el.value; if(!t) return; el.value='';
  const inp={type:'text',text:t};
  if(currentDevice) dcRaw(currentDevice,{type:'screen_input',...inp});
  else agentFetch('/input',inp).catch(()=>{});
}

function scrCtrlStopped(){
  _scrRunning=false;
  $('scr-img').style.display='none'; $('scr-hint').style.display='';
  $('scr-btn').textContent='▶ Старт'; $('scr-btn').style.background='';
  $('scr-fps').textContent='— fps';
}

function scrCtrlFrame(msg){
  const img=$('scr-img'); if(!img) return;
  img.style.display='block'; $('scr-hint').style.display='none';
  img.src='data:'+msg.mime+';base64,'+msg.b64;
  _scrFpsCount++;
}

function scrFpsLoop(){
  if(!_scrRunning) return;
  _scrFpsCount++;
  const now=performance.now();
  if(now-_scrFpsTs>=1000){
    $('scr-fps').textContent=_scrFpsCount+' fps';
    _scrFpsCount=0; _scrFpsTs=now;
  }
  requestAnimationFrame(scrFpsLoop);
}

// ── Host: serve stream to controller ──
async function scrHostStart(from,msg){
  const dc=rtcs[from]?.dc;
  if(!dc||dc.readyState!=='open'){rlog('DC not open','err');return;}
  try{
    const info=await agentFetch('/screeninfo');
    _scrW=info.width||1080; _scrH=info.height||1920;
    dcRaw(from,{type:'screen_info',w:_scrW,h:_scrH});
  }catch(_){}
  _scrHostTo=from; _scrHostRunning=true;
  scrHostLoop(msg.fps||8, msg.quality||65);
}

function scrHostStop(from){ _scrHostRunning=false; _scrHostTo=null; clearTimeout(_scrHostTimer); }
function scrHostInput(from,msg){ rlog('input: '+JSON.stringify(msg)); agentFetch('/input',msg).then(r=>rlog('input ok')).catch(e=>rlog('input err: '+e.message,'err')); }

let _scrHostRunning=false, _scrHostTo=null, _scrHostTimer=null;

async function scrHostLoop(fps,quality){
  if(!_scrHostRunning||!_scrHostTo) return;
  const interval=Math.round(1000/fps);
  const SEP=new TextEncoder().encode('--frame');
  const CRLF2=new TextEncoder().encode('\r\n\r\n');
  const url=_agentUrl.replace(/\/+$/,'')+'/stream?q='+quality;
  let reader=null;
  try{
    const resp=await fetch(url);
    reader=resp.body.getReader();
    let buf=new Uint8Array(0), frames=0;
    while(_scrHostRunning){
      const{done,value}=await reader.read();
      if(done) break;
      const tmp=new Uint8Array(buf.length+value.length);
      tmp.set(buf); tmp.set(value,buf.length); buf=tmp;
      while(true){
        const hEnd=_idxOf(buf,CRLF2); if(hEnd===-1) break;
        const dStart=hEnd+4;
        const fEnd=_idxOf(buf,SEP,dStart); if(fEnd===-1) break;
        const frame=buf.slice(dStart,fEnd-2);
        const hdr=new TextDecoder().decode(buf.slice(0,hEnd));
        const mime=hdr.includes('jpeg')?'image/jpeg':'image/png';
        let b64s='';
        for(let i=0;i<frame.length;i+=16384) b64s+=String.fromCharCode(...frame.slice(i,i+16384));
        dcRaw(_scrHostTo,{type:'screen_frame',b64:btoa(b64s),mime});
        buf=buf.slice(fEnd);
        frames++;
        if(frames===1) rlog('стрим запущен','ok');
        if(interval>0) await new Promise(r=>setTimeout(r,interval));
      }
    }
  }catch(e){
    rlog('stream: '+e.message,'err');
  }finally{
    try{reader?.cancel();}catch(_){}
    if(_scrHostRunning) _scrHostTimer=setTimeout(()=>scrHostLoop(fps,quality),2000);
  }
}

function _idxOf(buf,seq,from=0){
  outer:for(let i=from;i<=buf.length-seq.length;i++){
    for(let j=0;j<seq.length;j++) if(buf[i+j]!==seq[j]) continue outer;
    return i;
  } return -1;
}

// SWIPE BACK
// ════════════════════════════════════════════
(()=>{
  let sx=0,sy=0,sw=false;
  const dev=$('s-device');
  dev.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;sw=sx<28;},{passive:true});
  dev.addEventListener('touchmove',e=>{if(!sw)return;const dx=e.touches[0].clientX-sx;if(dx>0&&Math.abs(e.touches[0].clientY-sy)<60)dev.style.transform='translateX('+Math.min(dx,window.innerWidth*.6)+'px)';},{passive:true});
  dev.addEventListener('touchend',e=>{if(!sw)return;sw=false;const dx=e.changedTouches[0].clientX-sx;dev.style.transform='';if(dx>80)closeDevice();},{passive:true});
})();
